<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>カヤック出艇判断チェック</title>
<meta name="description" content="現在地のカヤック出艇判断（GO/CAUTION/STOP）を時間別に表示する簡易チェックツール">
<meta name="theme-color" content="#0a3d62">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="出艇判断">
<style>
  :root{
    --go:#1e9e54; --caution:#e6a100; --stop:#d63031;
    --go-bg:#e8f7ee; --caution-bg:#fdf4e0; --stop-bg:#fdecec;
    --bg:#f3f6f9; --card:#ffffff; --ink:#1c2733; --muted:#67778a;
    --line:#e2e8f0; --accent:#0a3d62;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:560px;margin:0 auto;padding:16px 14px 40px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
  header.top h1{font-size:18px;margin:0;letter-spacing:.02em}
  .refresh{
    border:1px solid var(--line);background:var(--card);color:var(--accent);
    border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;white-space:nowrap
  }
  .refresh:active{transform:scale(.97)}
  .locbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12.5px;color:var(--muted)}
  .locbar .loc{flex:1;line-height:1.45}
  .locbar .loc b{color:var(--ink);font-weight:600}
  .locbtn{border:1px solid var(--line);background:var(--card);color:var(--accent);border-radius:999px;
    padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
  .locbtn:active{transform:scale(.97)}
  .locwarn{color:var(--stop)}
  .tabs{display:flex;gap:8px;margin:0 0 14px}
  .tabs button{
    flex:1;border:1px solid var(--line);background:var(--card);color:var(--muted);
    border-radius:12px;padding:10px 4px;font-size:14px;font-weight:700;cursor:pointer;line-height:1.2
  }
  .tabs button small{display:block;font-size:11px;font-weight:500;margin-top:1px;color:var(--muted)}
  .tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tabs button.active small{color:#cfe0ee}
  .legend{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;font-size:11px;color:var(--muted);margin:0 0 14px}
  .legend span{display:inline-flex;align-items:center;gap:4px}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
  .day{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:0;margin-bottom:16px;overflow:hidden;box-shadow:0 1px 2px rgba(16,42,67,.04)
  }
  .day-head{display:flex;align-items:baseline;gap:8px;padding:14px 16px 0;flex-wrap:wrap}
  .day-head h2{font-size:17px;margin:0}
  .day-date{color:var(--muted);font-size:12px}
  .verdict{margin:12px 16px 0;border-radius:14px;padding:16px;display:flex;align-items:flex-start;gap:14px}
  .verdict.GO{background:var(--go-bg)} .verdict.CAUTION{background:var(--caution-bg)} .verdict.STOP{background:var(--stop-bg)}
  .badge{font-size:24px;font-weight:800;letter-spacing:.02em;color:#fff;border-radius:12px;padding:10px 12px;min-width:112px;text-align:center;line-height:1.1;flex:none;white-space:nowrap}
  .badge.CAUTION{font-size:21px}
  .badge.GO{background:var(--go)} .badge.CAUTION{background:var(--caution)} .badge.STOP{background:var(--stop)}
  .badge small{display:block;font-size:11px;font-weight:600;opacity:.9;margin-top:3px;letter-spacing:.02em}
  .verdict-text{font-size:13px;color:var(--ink)} .verdict-text .why{font-weight:700;font-size:13.5px}
  .advice{margin-top:7px;font-size:12.5px;color:#8a5a00;line-height:1.5}
  .advice.thunder{color:var(--stop);font-weight:700}
  .hwrap{padding:6px 8px 4px}
  .hrow{display:grid;grid-template-columns:54px 1fr auto;gap:10px;align-items:center;
    padding:9px 8px;border-bottom:1px solid var(--line)}
  .hrow:last-child{border-bottom:none}
  .hrow.STOP{background:#fdf4f4}
  .htime{font-size:14px;font-weight:700}
  .hvals{font-size:13px;color:var(--ink);line-height:1.35}
  .hvals .lab{color:var(--muted);font-size:11px}
  .hvals small{color:var(--muted);font-weight:500}
  .hvals .warn{color:var(--stop);font-weight:700}
  .hvals .bolt{color:var(--stop);font-weight:700}
  .hbadge{display:inline-block;font-size:12px;font-weight:800;color:#fff;border-radius:7px;padding:5px 11px;letter-spacing:.03em;min-width:74px;text-align:center}
  .hbadge.GO{background:var(--go)} .hbadge.CAUTION{background:var(--caution)} .hbadge.STOP{background:var(--stop)}
  .tide-row{padding:11px 14px;background:var(--card);border-top:1px solid var(--line);font-size:13px}
  .tide-row .k{font-size:11px;color:var(--muted);margin:0 0 4px}
  .tide-line{display:flex;flex-wrap:wrap;gap:6px 14px}
  .tide-line span{white-space:nowrap} .tide-line .hi{color:#0a6cb3;font-weight:600} .tide-line .lo{color:#b06a00;font-weight:600}
  .conf{margin:10px 16px 0;font-size:12px;color:#8a5a00;background:#fff7e6;border:1px solid #ffe2a8;border-radius:10px;padding:8px 10px;display:none}
  .conf.show{display:block}
  .disclaimer{background:#fff;border:1px solid var(--line);border-left:4px solid var(--stop);border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--ink);margin:14px 0 14px;line-height:1.7}
  .disclaimer b{color:var(--stop)}
  .credit{font-size:11px;color:var(--muted);text-align:center;line-height:1.8} .credit a{color:var(--muted)}
  .loading,.error{text-align:center;padding:40px 16px;color:var(--muted)} .error{color:var(--stop)}
  .spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>🛶 カヤック出艇判断チェック</h1>
    <button class="refresh" id="refreshBtn">↻ 更新</button>
  </header>

  <div class="locbar">
    <div class="loc" id="locText">現在地を取得しています…</div>
    <button class="locbtn" id="locBtn">📍 現在地</button>
  </div>

  <div class="tabs" id="tabs">
    <button data-off="0" class="active">今日<small id="lab0"></small></button>
    <button data-off="1">明日<small id="lab1"></small></button>
    <button data-off="2">明後日<small id="lab2"></small></button>
  </div>

  <div class="legend">
    <span><i class="dot" style="background:var(--go)"></i>GO 出られそう</span>
    <span><i class="dot" style="background:var(--caution)"></i>CAUTION 要確認</span>
    <span><i class="dot" style="background:var(--stop)"></i>STOP やめる</span>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div>データを取得しています…</div>
  </div>

  <div class="disclaimer">
    ⚠️ <b>これは個人が自分のために作った簡易ツールです。</b>精度の保証はできません。最終判断は、海快晴等の専門情報・現地での目視確認と合わせて、必ず<b>自己責任</b>で行ってください。
  </div>

  <p class="credit">

//=================== 設定 ===================
const TZ = "Asia/Tokyo";
const FORECAST_DAYS = 3;
const HOURS = [6,8,10,12,14,16];                 // 出艇に現実的な時間帯（2時間刻み）
const DEFAULT_LOC = {lat:36.80, lon:137.20, name:"富山湾（既定）"};

// 判定しきい値（初心者向け）
const WIND_GO=3.0, WIND_STOP=5.0, WAVE_STOP=0.5;
const THUNDER_CODES=[95,96,99];                  // WMO 雷コード
const DIV_BASE=2.5, DIV_PER_DAY=0.5;             // 予報割れ（JMA系 vs GFS系）判定

const COMPASS=['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];
const WEEKDAY=['日','月','火','水','木','金','土'];

//=================== ユーティリティ ===================
function dirText(deg){ return COMPASS[Math.round(deg/22.5)%16]; }
function pad(n){ return String(n).padStart(2,'0'); }
function jstDateParts(offsetDays=0){
  const now=new Date(Date.now()+offsetDays*86400000);
  const f=new Intl.DateTimeFormat('en-CA',{timeZone:TZ,year:'numeric',month:'2-digit',day:'2-digit'});
  const [y,m,d]=f.format(now).split('-');
  return {y:+y,m:+m,d:+d,str:`${y}-${m}-${d}`};
}
function hourOf(iso){ return +iso.slice(11,13); }
function dateOf(iso){ return iso.slice(0,10); }
function weekdayOf(dateStr){ const [y,m,d]=dateStr.split('-').map(Number); return WEEKDAY[new Date(y,m-1,d).getDay()]; }
function mdLabel(dateStr){ const [,m,d]=dateStr.split('-').map(Number); return `${m}/${d}`; }
function mdjp(dateStr){ const [,m,d]=dateStr.split('-').map(Number); return `${m}月${d}日`; }
function haversine(a,b,c,d){
  const R=6371,toR=x=>x*Math.PI/180;
  const dLat=toR(c-a),dLon=toR(d-b);
  const s=Math.sin(dLat/2)**2+Math.cos(toR(a))*Math.cos(toR(c))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function nearestStation(lat,lon){
  let best=null,bd=Infinity;
  for(const s of TIDE_STATIONS){
    const d=haversine(lat,lon,s[2],s[3]);
    if(d<bd){bd=d;best=s;}
  }
  return {pc:best[0],hc:best[1],lat:best[2],lon:best[3],name:best[4],dist:bd};
}

//=================== データ取得 ===================
async function getJSON(url){ const r=await fetch(url); if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); }
async function fetchWeather(lat,lon){
  const base=`latitude=${lat}&longitude=${lon}&timezone=${TZ}&forecast_days=${FORECAST_DAYS}`;
  const wxUrl=`https://api.open-meteo.com/v1/forecast?${base}`
    +`&hourly=wind_speed_10m,wind_direction_10m,weather_code&models=jma_seamless,gfs_seamless&wind_speed_unit=ms`;
  const marUrl=`https://marine-api.open-meteo.com/v1/marine?${base}&hourly=wave_height`;
  const [wx,mar]=await Promise.all([getJSON(wxUrl),getJSON(marUrl).catch(e=>{console.warn("marine fail",e);return null;})]);
  return {wx,mar};
}
async function fetchTide(st){
  const t=jstDateParts(0);
  const url=`https://tide736.net/api/get_tide.php?pc=${st.pc}&hc=${st.hc}&yr=${t.y}&mn=${t.m}&dy=${t.d}&rg=week`;
  return getJSON(url).catch(e=>{console.warn("tide fail",e);return null;});
}

//=================== 判定 ===================
function idxAt(times,dateStr,h){
  for(let i=0;i<times.length;i++){ if(dateOf(times[i])===dateStr && hourOf(times[i])===h) return i; }
  return -1;
}
function hourVerdict(w,wave,thunder){
  if(thunder) return "STOP";
  if(w>=WIND_STOP || (wave!=null&&wave>=WAVE_STOP)) return "STOP";
  if(w<=WIND_GO && (wave==null||wave<WAVE_STOP)) return "GO";
  return "CAUTION";
}
const RANK={GO:0,CAUTION:1,STOP:2};

function assessDay(data,dayOffset){
  const {wx,mar}=data;
  const dateStr=jstDateParts(dayOffset).str;
  const wt=wx.hourly.time;
  const wj=wx.hourly.wind_speed_10m_jma_seamless, wg=wx.hourly.wind_speed_10m_gfs_seamless;
  const dj=wx.hourly.wind_direction_10m_jma_seamless;
  const cj=wx.hourly.weather_code_jma_seamless, cg=wx.hourly.weather_code_gfs_seamless;
  const mt=mar?mar.hourly.time:[], mwave=mar?mar.hourly.wave_height:[];

  const rows=[]; let divSum=0,divN=0;
  for(const h of HOURS){
    const i=idxAt(wt,dateStr,h);
    if(i<0) continue;
    const vj=wj[i]??0, vg=wg[i]??0, w=Math.max(vj,vg);
    divSum+=Math.abs(vj-vg); divN++;
    const mi=mt.length?idxAt(mt,dateStr,h):-1;
    const wave=mi>=0?mwave[mi]:null;
    const thunder=THUNDER_CODES.includes(cj[i])||THUNDER_CODES.includes(cg[i]);
    rows.push({h,w,dir:dj[i],wave,thunder,verdict:hourVerdict(w,wave,thunder)});
  }

  // 予報割れ（信頼度）
  const divAvg=divN?divSum/divN:0;
  const lowConfidence=divAvg>(DIV_BASE+DIV_PER_DAY*dayOffset);
  if(lowConfidence){ for(const r of rows){ if(r.verdict==="GO") r.verdict="CAUTION"; } }

  // 総合判断＝一番悪い時間帯
  let overall="GO"; for(const r of rows){ if(RANK[r.verdict]>RANK[overall]) overall=r.verdict; }
  if(!rows.length) overall=null;

  // 数値の最大（根拠用）
  let maxWind=0,maxWave=0,anyWave=false;
  for(const r of rows){ if(r.w>maxWind)maxWind=r.w; if(r.wave!=null){anyWave=true; if(r.wave>maxWave)maxWave=r.wave;} }

  // 撤退の目安（GOだった後に悪化し始める時刻）
  let sawGo=false,retreat=null;
  for(const r of rows){ if(r.verdict==="GO")sawGo=true; else if(sawGo&&retreat==null)retreat=r.h; }

  // 雷の時間帯
  const thunderHours=rows.filter(r=>r.thunder).map(r=>r.h);

  // 根拠テキスト
  let reasons=[];
  if(thunderHours.length) reasons.push("雷の予報あり");
  if(maxWind>=WIND_STOP) reasons.push(`最大風速${maxWind.toFixed(1)}m/s（5以上）`);
  if(anyWave&&maxWave>=WAVE_STOP) reasons.push(`最大波高${maxWave.toFixed(2)}m（0.5以上）`);
  if(!reasons.length){
    if(overall==="GO") reasons.push(`風${maxWind.toFixed(1)}m/s・波${anyWave?maxWave.toFixed(2)+'m':'—'}と穏やか`);
    else reasons.push(`風${maxWind.toFixed(1)}m/s・波${anyWave?maxWave.toFixed(2)+'m':'—'}（境界域・要確認）`);
  }

  // 潮汐
  let tides=null;
  const tide=data.tide;
  if(tide&&tide.tide&&tide.tide.chart&&tide.tide.chart[dateStr]){
    const c=tide.tide.chart[dateStr];
    tides={flood:(c.flood||[]).map(x=>({time:x.time,cm:x.cm})), ebb:(c.edd||[]).map(x=>({time:x.time,cm:x.cm}))};
  }

  return {dayOffset,dateStr,rows,overall,maxWind,maxWave,anyWave,retreat,thunderHours,reasons,
    lowConfidence,divAvg,tides};
}

//=================== 描画 ===================
const VLABEL={GO:"出られそう",CAUTION:"要確認",STOP:"やめる"};
function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function renderDay(a){
  if(a.overall==null){
    return `<div class="day"><div class="loading">この日の予報データがありません。</div></div>`;
  }
  const rowsHtml=a.rows.map(r=>{
    const wcls=r.w>=WIND_STOP?'warn':''; const vcls=(r.wave!=null&&r.wave>=WAVE_STOP)?'warn':'';
    const bolt=r.thunder?' <span class="bolt">⚡雷</span>':'';
    const waveTxt=r.wave!=null?`${r.wave.toFixed(1)}`:'—';
    return `<div class="hrow ${r.verdict}">
      <div class="htime">${pad(r.h)}時</div>
      <div class="hvals"><span class="lab">風</span> <span class="${wcls}">${r.w.toFixed(1)}<small>m/s</small></span> ${dirText(r.dir)}　<span class="lab">波</span> <span class="${vcls}">${waveTxt}${r.wave!=null?'<small>m</small>':''}</span>${bolt}</div>
      <div class="hbadge ${r.verdict}">${r.verdict}</div>
    </div>`;
  }).join('');

  let advice='';
  if(a.thunderHours.length){
    const list=a.thunderHours.map(h=>`${pad(h)}時台`).join('・');
    advice+=`<div class="advice thunder">⚡ ${list}に雷の予報。その時間帯は絶対に出ないでください。</div>`;
  }
  if(a.retreat!=null){
    advice+=`<div class="advice">※ ${a.retreat}時以降は条件が悪化します。出艇するなら${a.retreat}時より前（午前中など）に切り上げを。</div>`;
  } else if(a.overall==="GO"){
    advice+=`<div class="advice">日中（6〜16時）を通して比較的穏やかな見込みです。</div>`;
  }

  let tideHtml='<span style="color:var(--muted)">潮汐データ取得不可</span>';
  if(a.tides){
    const hi=a.tides.flood.map(x=>`<span class="hi">満 ${x.time.slice(0,5)} (${x.cm}cm)</span>`).join('');
    const lo=a.tides.ebb.map(x=>`<span class="lo">干 ${x.time.slice(0,5)} (${x.cm}cm)</span>`).join('');
    tideHtml=`<div class="tide-line">${hi}${lo}</div>`;
  }

  const conf=a.lowConfidence
    ? `<div class="conf show">予報が割れています（気象モデル2系統の風速差 平均約${a.divAvg.toFixed(1)}m/s）。信頼度が低いため判定を一段厳しくしています。</div>`
    : '';

  return `
  <div class="day">
    <div class="day-head"><h2>【${mdjp(a.dateStr)}の出艇判断】</h2><span class="day-date">${weekdayOf(a.dateStr)}曜</span></div>
    <div class="verdict ${a.overall}">
      <div class="badge ${a.overall}">${a.overall}<small>${VLABEL[a.overall]}</small></div>
      <div class="verdict-text">
        <div class="why">総合判断：${a.reasons.map(escapeHtml).join(' / ')}</div>
        ${advice}
      </div>
    </div>
    ${conf}
    <div class="hwrap">${rowsHtml||'<div class="loading">時間別データなし</div>'}</div>
    <div class="tide-row"><p class="k">潮汐（${escapeHtml(STATION?STATION.name:'')}）</p>${tideHtml}</div>
  </div>`;
}

//=================== 状態・実行 ===================
let LOC=null, STATION=null, DATA=null, CURRENT_OFF=0;

function setTabLabels(){
  for(let off=0;off<3;off++){
    document.getElementById('lab'+off).textContent=mdLabel(jstDateParts(off).str);
  }
}
function showDay(off){
  CURRENT_OFF=off;
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('active',+b.dataset.off===off));
  if(!DATA) return;
  document.getElementById('content').innerHTML=renderDay(assessDay(DATA,off));
}

async function load(lat,lon,locLabel){
  const content=document.getElementById('content');
  content.innerHTML='<div class="loading"><div class="spinner"></div>データを取得しています…</div>';
  LOC={lat,lon};
  STATION=nearestStation(lat,lon);
  const distTxt=STATION.dist>60?`<span class="locwarn">約${Math.round(STATION.dist)}km・遠い</span>`:`約${Math.round(STATION.dist)}km`;
  document.getElementById('locText').innerHTML=
    `📍 <b>${locLabel}</b>（${lat.toFixed(3)}, ${lon.toFixed(3)}）<br>潮汐観測点：<b>${escapeHtml(STATION.name)}</b>（${distTxt}）`;
  try{
    const wxp=fetchWeather(lat,lon);
    const tdp=fetchTide(STATION);
    const wx=await wxp; const tide=await tdp;
    DATA={wx:wx.wx,mar:wx.mar,tide};
    setTabLabels();
    showDay(CURRENT_OFF);
  }catch(e){
    console.error(e);
    content.innerHTML=`<div class="error">⚠️ データを取得できませんでした。<br>通信環境を確認して「更新」を押してください。<br><small>${escapeHtml(e.message||e)}</small></div>`;
  }
}

function locateAndLoad(){
  document.getElementById('locText').textContent='現在地を取得しています…';
  if(!navigator.geolocation){ fallback('この端末では位置情報を取得できません'); return; }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const {latitude,longitude}=pos.coords;
      try{ localStorage.setItem('kayak_loc',JSON.stringify({lat:latitude,lon:longitude})); }catch(e){}
      load(latitude,longitude,'現在地');
    },
    err=>{ console.warn('geo err',err); fallbackStored('現在地を取得できませんでした'); },
    {enableHighAccuracy:true,timeout:10000,maximumAge:300000}
  );
}
function fallbackStored(msg){
  let saved=null;
  try{ const v=localStorage.getItem('kayak_loc'); if(v) saved=JSON.parse(v); }catch(e){}
  if(saved){ document.getElementById('locText').innerHTML=`<span class="locwarn">${msg}。前回の位置で表示します。</span>`; load(saved.lat,saved.lon,'前回の位置'); }
  else fallback(msg);
}
function fallback(msg){
  document.getElementById('locText').innerHTML=`<span class="locwarn">${msg}。既定地点（富山湾）で表示します。</span>`;
  load(DEFAULT_LOC.lat,DEFAULT_LOC.lon,DEFAULT_LOC.name);
}

//=================== 初期化 ===================
(function init(){
  setTabLabels();
  document.querySelectorAll('#tabs button').forEach(b=>{
    b.addEventListener('click',()=>showDay(+b.dataset.off));
  });
  document.getElementById('refreshBtn').addEventListener('click',()=>{ if(LOC) load(LOC.lat,LOC.lon,'現在地'); else locateAndLoad(); });
  document.getElementById('locBtn').addEventListener('click',locateAndLoad);
  locateAndLoad();
})();
</script>
</body>
